<!doctype html>
<html lang="en">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Admin Login | Ramanujan Magic Square</title>

<style>

body{
margin:0;
min-height:100vh;
display:grid;
place-items:center;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;

background:
radial-gradient(1000px 500px at 20% 10%, #1a2f5a 0%, transparent 60%),
radial-gradient(800px 400px at 80% 20%, #132449 0%, transparent 60%),
#0b1220;

color:#e8eeff;
}

.login-box{

width:min(420px,92vw);

background:linear-gradient(
180deg,
rgba(255,255,255,.05),
rgba(255,255,255,.02)
);

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

padding:28px;

box-shadow:0 20px 60px rgba(0,0,0,.35);
}

h1{
margin:0 0 16px;
font-size:28px;
}

input{
width:100%;
padding:14px 16px;
margin-top:12px;

border-radius:12px;

border:1px solid rgba(255,255,255,.14);

background:rgba(255,255,255,.05);

color:#e8eeff;

font-size:15px;

outline:none;
}

input:focus{
border-color:#6ee7ff;
box-shadow:0 0 0 3px rgba(110,231,255,.15);
}

button{

width:100%;
padding:14px;

margin-top:16px;

border-radius:12px;

border:1px solid rgba(110,231,255,.35);

font-weight:700;

font-size:15px;

cursor:pointer;

color:#e8eeff;

background:linear-gradient(
180deg,
rgba(110,231,255,.25),
rgba(110,231,255,.10)
);

transition:.2s;
}

button:hover{
transform:translateY(-1px);
}

#msg{

margin-top:12px;

font-size:14px;

color:#9aa7c2;
}

</style>
</head>

<body>

<div class="login-box">

<h1>Admin Login</h1>

<input id="email" type="email" placeholder="Admin email">

<input id="password" type="password" placeholder="Password">

<button id="loginBtn">Login</button>

<div id="msg"></div>

</div>

<script type="module" src="./admin-auth.js"></script>

</body>
</html>
