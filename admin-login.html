<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Login | Ramanujan Magic Square</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:#0b1220;
      color:#e8eeff;
    }
    .login-box{
      width:min(420px,92vw);
      background:#121b2f;
      padding:24px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 16px 40px rgba(0,0,0,.28);
    }
    h1{margin:0 0 14px;}
    input,button{
      width:100%;
      margin-top:12px;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.05);
      color:#e8eeff;
      font-size:14px;
      box-sizing:border-box;
    }
    button{
      cursor:pointer;
      font-weight:700;
      background:linear-gradient(180deg, rgba(110,231,255,.22), rgba(110,231,255,.10));
    }
    #msg{
      margin-top:12px;
      color:#9aa7c2;
      font-size:14px;
      line-height:1.6;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Admin Login</h1>
    <input id="email" type="email" placeholder="Admin email" />
    <input id="password" type="password" placeholder="Password" />
    <button id="loginBtn" type="button">Login</button>
    <div id="msg"></div>
  </div>

  <script type="module" src="./admin-auth.js"></script>
</body>
</html>
